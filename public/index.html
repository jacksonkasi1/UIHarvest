<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Design System Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#09090b;--bg1:#111113;--bg2:#1a1a1f;--bg3:#232329;--bg-hover:#2a2a32;
  --border:#2a2a32;--border-light:#3a3a44;
  --text:#e4e4e7;--text2:#a1a1aa;--text3:#63636e;
  --accent:#7c5cfc;--accent2:#9b7fff;--accent-dim:rgba(124,92,252,.15);
  --green:#22c55e;--orange:#f59e0b;--red:#ef4444;--blue:#3b82f6;--pink:#ec4899;--cyan:#06b6d4;--yellow:#eab308;
  --mono:'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,sans-serif;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg0);color:var(--text);font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent2)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;min-width:280px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sidebar-header p{font-size:11px;color:var(--text3);margin-top:4px;word-break:break-all}
.sidebar-header .ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:99px;margin-top:6px;font-weight:600}
.sidebar-header .ai-badge.on{background:var(--green)22;color:var(--green);border:1px solid var(--green)44}
.sidebar-header .ai-badge.off{background:var(--orange)22;color:var(--orange);border:1px solid var(--orange)44}
.nav-group{padding:10px 0}
.nav-group-title{padding:4px 20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 20px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--bg2);color:var(--text);border-left-color:var(--accent)}
.nav-item .badge-count{margin-left:auto;font-size:10px;background:var(--bg3);color:var(--text3);padding:1px 6px;border-radius:99px;font-weight:600}
.nav-item .ai-tag{margin-left:4px;font-size:8px;color:var(--green);font-weight:700;letter-spacing:.5px}
.nav-icon{width:16px;text-align:center;font-size:13px}
.main{flex:1;overflow-y:auto;padding:32px 40px;background:var(--bg0)}
.main-title{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.4px}
.main-subtitle{font-size:13px;color:var(--text3);margin-bottom:28px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:28px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-md);padding:14px}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.stat-card.ai{border-color:var(--green)44}
.stat-card.ai .val{color:var(--green)}
.overview-screenshot{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;max-width:900px;margin-top:16px}
.overview-screenshot img{width:100%;display:block}
.summary-card{background:var(--bg1);border:1px solid var(--green)44;border-radius:var(--r-md);padding:20px;margin-bottom:24px}
.summary-card h3{font-size:13px;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.summary-row{display:flex;gap:12px;margin-bottom:8px;font-size:13px}
.summary-label{color:var(--text3);min-width:120px;font-weight:600}
.summary-value{color:var(--text2)}
.summary-style{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:12px}
.token-named{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.token-named-item{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;cursor:pointer;transition:border-color .15s}
.token-named-item:hover{border-color:var(--accent)}
.token-named-item .preview{height:40px;border-radius:var(--r-sm);margin-bottom:8px}
.token-named-item .name{font-size:13px;font-weight:600;color:var(--text)}
.token-named-item .css-var{font-size:11px;font-family:var(--mono);color:var(--accent)}
.token-named-item .role{font-size:10px;color:var(--text3);margin-top:4px}
.token-named-item .hex{font-size:11px;font-family:var(--mono);color:var(--text3)}
.comp-lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.comp-lib-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:border-color .15s}
.comp-lib-card:hover{border-color:var(--accent)}
.comp-lib-card .card-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.comp-lib-card .card-header h3{font-size:15px;font-weight:700;margin-bottom:2px}
.comp-lib-card .card-header .cat{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:2px 8px;border-radius:99px;display:inline-block}
.comp-lib-card .card-header .desc{font-size:12px;color:var(--text3);margin-top:6px}
.comp-lib-card .card-shots{display:flex;gap:6px;padding:12px;background:var(--bg2);overflow-x:auto}
.comp-lib-card .card-shots img{height:80px;border-radius:var(--r-sm);object-fit:contain;flex-shrink:0}
.comp-lib-card .card-meta{padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap}
.comp-lib-card .meta-tag{font-size:10px;background:var(--bg3);padding:3px 8px;border-radius:99px;color:var(--text2)}
.comp-lib-card .variant-tag{font-size:10px;background:var(--accent-dim);padding:3px 8px;border-radius:99px;color:var(--accent)}
.section-blueprint{display:flex;flex-direction:column;gap:12px}
.section-bp-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;display:flex;gap:16px;align-items:flex-start;cursor:pointer;transition:border-color .15s}
.section-bp-card:hover{border-color:var(--accent)}
.section-bp-card .bp-order{font-size:20px;font-weight:700;color:var(--accent);min-width:30px;text-align:center;padding-top:2px}
.section-bp-card .bp-body{flex:1}
.section-bp-card .bp-name{font-size:15px;font-weight:600}
.section-bp-card .bp-purpose{font-size:12px;color:var(--text3);margin-top:4px}
.section-bp-card .bp-layout{font-size:10px;background:var(--bg3);padding:2px 8px;border-radius:99px;color:var(--text2);display:inline-block;margin-top:6px}
.section-bp-card .bp-comps{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.section-bp-card .bp-comp{font-size:10px;background:var(--accent-dim);padding:2px 8px;border-radius:99px;color:var(--accent)}
.code-tabs{display:flex;gap:4px;margin-bottom:12px}
.code-tab{font-size:12px;padding:5px 14px;border-radius:var(--r-sm) var(--r-sm) 0 0;cursor:pointer;background:var(--bg3);color:var(--text3);border:1px solid var(--border);border-bottom:none}
.code-tab.active{background:var(--bg2);color:var(--accent);border-color:var(--accent)}
.code-block{background:var(--bg2);border:1px solid var(--border);border-radius:0 var(--r-md) var(--r-md) var(--r-md);padding:16px;font-family:var(--mono);font-size:11px;line-height:1.6;color:var(--text2);overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;position:relative}
.code-copy{position:absolute;top:8px;right:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 10px;border-radius:var(--r-sm);cursor:pointer;font-family:var(--mono)}
.code-copy:hover{background:var(--accent);color:white;border-color:var(--accent)}
.props-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.props-table th{text-align:left;padding:6px 10px;background:var(--bg2);color:var(--text3);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
.props-table td{padding:6px 10px;border-top:1px solid var(--border)}
.props-table .prop-name{font-family:var(--mono);color:var(--accent)}
.props-table .prop-type{font-family:var(--mono);color:var(--orange);font-size:11px}
.type-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.comp-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:border-color .15s}
.comp-card:hover{border-color:var(--accent)}
.comp-card .comp-shot{background:var(--bg2);display:flex;align-items:center;justify-content:center;min-height:70px;max-height:200px;overflow:hidden;border-bottom:1px solid var(--border);padding:10px}
.comp-card .comp-shot img{max-width:100%;max-height:180px;object-fit:contain}
.comp-card .comp-body{padding:10px 14px}
.comp-card .comp-type{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.comp-card .comp-name{font-size:13px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-card .comp-dims{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.sub-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.sub-tab{font-size:12px;padding:5px 12px;border-radius:99px;cursor:pointer;background:var(--bg2);color:var(--text3);border:1px solid var(--border);transition:all .12s}
.sub-tab:hover{color:var(--text);border-color:var(--border-light)}
.sub-tab.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;padding:40px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-lg);max-width:960px;width:100%;max-height:88vh;overflow-y:auto}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--bg1);z-index:1}
.modal-header h2{flex:1;font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{padding:24px}
.modal-shot{background:var(--bg2);border-radius:var(--r-md);padding:20px;margin-bottom:20px;display:flex;align-items:center;justify-content:center}
.modal-shot img{max-width:100%;max-height:300px;object-fit:contain}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;font-weight:700}
.style-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.style-row{display:flex;gap:8px;font-size:12px;padding:6px 10px;background:var(--bg2);border-radius:var(--r-sm)}
.style-key{color:var(--text3);min-width:120px;font-family:var(--mono)}
.style-val{color:var(--text);font-family:var(--mono);word-break:break-all}
.modal-children{display:flex;flex-wrap:wrap;gap:6px}
.modal-child-tag{font-size:11px;background:var(--bg3);padding:4px 10px;border-radius:99px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px}
.modal-child-tag:hover{background:var(--accent-dim);color:var(--accent)}
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px}
.color-swatch{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:border-color .15s}
.color-swatch:hover{border-color:var(--accent)}
.color-swatch .preview{height:60px}
.color-swatch .info{padding:8px 10px}
.color-swatch .hex{font-size:12px;font-weight:600;font-family:var(--mono)}
.color-swatch .usage{font-size:10px;color:var(--text3);margin-top:2px}
.color-swatch .count{font-size:10px;color:var(--text3)}
.section-list{display:flex;flex-direction:column;gap:14px}
.section-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:border-color .15s}
.section-card:hover{border-color:var(--accent)}
.section-card .section-shot{border-bottom:1px solid var(--border);overflow:hidden;max-height:300px}
.section-card .section-shot img{width:100%;display:block}
.section-card .section-body{padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.section-card .section-name{font-size:14px;font-weight:600;flex:1}
.section-card .section-tag{font-size:10px;font-family:var(--mono);color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:99px}
.section-card .section-dims{font-size:11px;color:var(--text3);font-family:var(--mono)}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.asset-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.asset-card .asset-preview{height:110px;display:flex;align-items:center;justify-content:center;background:var(--bg2);padding:8px;border-bottom:1px solid var(--border)}
.asset-card .asset-preview img{max-width:100%;max-height:100%;object-fit:contain}
.asset-card .asset-info{padding:8px 10px;font-size:11px;color:var(--text3);font-family:var(--mono)}
.asset-card .asset-title{font-size:11px;color:var(--text2);margin-bottom:2px}
.asset-card .asset-reuse{font-size:10px;color:var(--orange)}
.token-list{display:flex;flex-direction:column;gap:8px}
.token-item{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-family:var(--mono);font-size:12px;display:flex;gap:12px}
.token-key{color:var(--accent);min-width:200px}
.token-val{color:var(--text2);flex:1;word-break:break-all}
.token-count{color:var(--text3);white-space:nowrap}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.empty .emoji{font-size:40px;margin-bottom:12px}
.loading{text-align:center;padding:100px 20px;color:var(--text3)}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>🎨 Design Extractor</h1>
      <p id="page-url">Loading…</p>
      <div id="ai-status"></div>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>
  <main class="main" id="main-content">
    <div class="loading"><div class="spinner"></div>Loading design system…</div>
  </main>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header"><h2 id="modal-title">Component</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<script>
let DS=null,activeTab='overview',activeSubFilter='all',activeCodeTab='react';
const CAT_COLORS={button:'var(--blue)',card:'var(--green)',layout:'var(--accent)',navigation:'var(--red)',section:'var(--orange)',form:'var(--yellow)',media:'var(--cyan)',feedback:'var(--pink)',typography:'var(--text3)'};
const TC={button:'var(--blue)',card:'var(--green)',link:'var(--cyan)','link-arrow':'var(--cyan)',input:'var(--orange)',badge:'var(--pink)',heading:'var(--accent)',text:'var(--text3)','icon-container':'var(--orange)',icon:'var(--orange)','section-header':'var(--green)',navigation:'var(--red)',layout:'var(--accent)',tabs:'var(--yellow)',accordion:'var(--yellow)',testimonial:'var(--pink)','cta-banner':'var(--red)',logo:'var(--cyan)',footer:'var(--text3)'};
function tc(t){return TC[t]||'var(--text3)'}
function catColor(c){return CAT_COLORS[c]||'var(--text3)'}
const hasAI=()=>DS?.analysis!=null;

async function boot(){
  try{const r=await fetch('/api/design-system');DS=await r.json();
    document.getElementById('page-url').textContent=DS.meta.url;
    document.title=\`Design System — \${DS.meta.title}\`;
    document.getElementById('ai-status').innerHTML=hasAI()
      ?\`<div class="ai-badge on">🤖 AI Analysis Complete · $\${DS.analysis.aiUsage.cost}</div>\`
      :\`<div class="ai-badge off">⚠️ No AI · Raw data only</div>\`;
    buildNav();showTab('overview');
  }catch(e){document.getElementById('main-content').innerHTML=\`<div class="empty"><div class="emoji">❌</div>Failed.<br>\${e.message}</div>\`}
}

function buildNav(){
  const ct={};DS.components.forEach(c=>{ct[c.type]=(ct[c.type]||0)+1});
  const ai=hasAI();
  const g=[
    {t:'Overview',i:[{id:'overview',ic:'📊',l:'Dashboard'}]},
    ...(ai?[{t:'AI Analysis 🤖',i:[
      {id:'ai-summary',ic:'🧠',l:'Design Summary',ai:true},
      {id:'ai-tokens',ic:'🏷️',l:'Named Tokens',ai:true,c:(DS.analysis.namedTokens.colors.length+DS.analysis.namedTokens.spacing.length+DS.analysis.namedTokens.typography.length)},
      {id:'ai-components',ic:'🧩',l:'Component Library',ai:true,c:DS.analysis.componentLibrary.length},
      {id:'ai-blueprint',ic:'🗺️',l:'Section Blueprint',ai:true,c:DS.analysis.sectionBlueprint.length},
      {id:'ai-code',ic:'💻',l:'Generated Code',ai:true,c:DS.analysis.codeSnippets.length},
    ]}]:[]),
    {t:'Raw Tokens',i:[
      {id:'colors',ic:'🎨',l:'Colors',c:DS.tokens.colors.length},
      {id:'typography',ic:'📝',l:'Typography',c:DS.tokens.typography.length},
      {id:'spacing',ic:'📐',l:'Spacing',c:DS.tokens.spacing.length},
    ]},
    {t:'Raw Components',i:Object.entries(ct).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([type,count])=>({
      id:'comp-'+type,ic:'📦',l:type.charAt(0).toUpperCase()+type.slice(1).replace(/-/g,' ')+'s',c:count,
    }))},
    {t:'Layout',i:[{id:'sections',ic:'📑',l:'Sections',c:DS.sections.length}]},
    {t:'Assets',i:[
      {id:'images',ic:'🖼️',l:'Images',c:DS.assets.images.length},
      {id:'svgs',ic:'✨',l:'SVGs',c:DS.assets.svgs.length},
    ]},
  ];
  let h='';g.forEach(gr=>{h+=\`<div class="nav-group"><div class="nav-group-title">\${gr.t}</div>\`;
    gr.i.forEach(it=>{h+=\`<div class="nav-item" data-tab="\${it.id}" onclick="showTab('\${it.id}')"><span class="nav-icon">\${it.ic}</span>\${it.l}\${it.ai?'<span class="ai-tag">AI</span>':''}\${it.c!=null?\`<span class="badge-count">\${it.c}</span>\`:\`\`}</div>\`});
    h+='</div>'});
  document.getElementById('sidebar-nav').innerHTML=h;
}

function showTab(id){
  activeTab=id;activeSubFilter='all';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab===id));
  const m=document.getElementById('main-content');
  const R={
    overview:renderOverview,
    'ai-summary':renderAiSummary,'ai-tokens':renderAiTokens,'ai-components':renderAiComponents,
    'ai-blueprint':renderAiBlueprint,'ai-code':renderAiCode,
    colors:renderColors,typography:renderTypography,spacing:renderSpacing,
    sections:renderSections,images:renderImages,svgs:renderSvgs,
  };
  if(R[id])m.innerHTML=R[id]();
  else if(id.startsWith('comp-'))m.innerHTML=renderRawComponents(id.replace('comp-',''));
  else m.innerHTML=empty('Unknown tab');
}

// ════════════════════════════════════════
// OVERVIEW
// ════════════════════════════════════════

function renderOverview(){
  const d=DS,ai=hasAI(),a=d.analysis;
  const ct={};d.components.forEach(c=>{ct[c.type]=(ct[c.type]||0)+1});
  return\`
    <h1 class="main-title">\${esc(d.meta.title)}</h1>
    <p class="main-subtitle">\${esc(d.meta.url)}&nbsp;·&nbsp;\${d.meta.viewport.width}×\${d.meta.fullHeight}px</p>
    \${ai?\`
      <div class="summary-card">
        <h3>🤖 AI Design Summary</h3>
        <div class="summary-style">\${esc(a.designSummary.overallStyle)}</div>
        <div class="summary-row"><div class="summary-label">Brand</div><div class="summary-value">\${esc(a.designSummary.brandDescription)}</div></div>
        <div class="summary-row"><div class="summary-label">Colors</div><div class="summary-value">\${esc(a.designSummary.colorPalette)}</div></div>

function setCodeTab(tab,el){
  activeCodeTab=tab;
  // Update all code blocks on the page
  document.querySelectorAll('.code-block[data-comp]').forEach(block=>{
    const data=block.getAttribute('data-'+tab);
    if(data){
      const code=decodeURIComponent(atob(data));
      block.innerHTML=\`<button class="code-copy" onclick="event.stopPropagation();copyFromBlock(this)">Copy</button>\`+esc(code);
    }
  });
  // Update tab active states
  document.querySelectorAll('.code-tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase()===tab));
}

function renderRawComponents(type){
  const all=DS.components.filter(c=>c.type===type);if(!all.length)return empty(\`No \${type}s\`);
  const st={};all.forEach(c=>{st[c.subType]=(st[c.subType]||0)+1});
  const filtered=activeSubFilter==='all'?all:all.filter(c=>c.subType===activeSubFilter);
  const groups={};filtered.forEach(c=>{if(!groups[c.signature])groups[c.signature]=[];groups[c.signature].push(c)});
  const variants=Object.values(groups).map(g=>({...g[0],instanceCount:g.length}));
  return\`<h1 class="main-title">\${type.charAt(0).toUpperCase()+type.slice(1).replace(/-/g,' ')}s</h1><p class="main-subtitle">\${all.length} total · \${Object.keys(groups).length} variants</p>
  \${Object.keys(st).length>1?\`<div class="sub-tabs"><div class="sub-tab \${activeSubFilter==='all'?'active':''}" onclick="activeSubFilter='all';document.getElementById('main-content').innerHTML=renderRawComponents('\${type}')">All</div>\${Object.entries(st).map(([s,c])=>\`<div class="sub-tab \${activeSubFilter===s?'active':''}" onclick="activeSubFilter='\${s}';document.getElementById('main-content').innerHTML=renderRawComponents('\${type}')">\${s} (\${c})</div>\`).join('')}</div>\`:\`\`}
  <div class="comp-grid">\${variants.map(c=>\`
    <div class="comp-card" onclick='openRawCompModal("\${c.id}")'>
      <div class="comp-shot">\${c.screenshot?\`<img src="/output/\${c.screenshot}" loading="lazy"/>\`:\`<span style="color:var(--text3);font-size:12px">No shot</span>\`}</div>
      <div class="comp-body">
        <div class="comp-type"><span class="type-dot" style="background:\${tc(c.type)}"></span><span style="color:\${tc(c.type)}">\${c.subType}</span>\${c.instanceCount>1?\`<span style="color:var(--text3)">×\${c.instanceCount}</span>\`:\`\`}</div>
        <div class="comp-name">\${esc(c.name)}</div>
        <div class="comp-dims">\${c.rect.width}×\${c.rect.height}px</div>
      </div>
    </div>\`).join('')}</div>\`}

function openAiCompModal(compId){
  const comp=DS.analysis.componentLibrary.find(c=>c.id===compId);
  if(!comp)return;
  const instances=comp.instanceIds.map(id=>DS.components.find(c=>c.id===id)).filter(Boolean);
  const shots=instances.filter(i=>i.screenshot).slice(0,6);
  const snippet=DS.analysis.codeSnippets.find(s=>s.componentId===compId);
  const col=catColor(comp.category);

  document.getElementById('modal-title').innerHTML=\`<span style="background:\${col}22;color:\${col};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;margin-right:6px">\${comp.category}</span>\${esc(comp.displayName)}\`;
  document.getElementById('modal-body').innerHTML=\`
    \${shots.length?\`<div style="display:flex;gap:8px;overflow-x:auto;padding:12px;background:var(--bg2);border-radius:var(--r-md);margin-bottom:20px">\${shots.map(s=>\`<img src="/output/\${s.screenshot}" style="height:120px;border-radius:var(--r-sm);object-fit:contain;flex-shrink:0"/>\`).join('')}</div>\`:\`\`}
    <div class="modal-section"><h3>Description</h3><p style="font-size:13px;color:var(--text2)">\${esc(comp.description)}</p></div>
    \${comp.props.length?\`<div class="modal-section"><h3>Props</h3><table class="props-table"><thead><tr><th>Name</th><th>Type</th><th>Description</th><th>Examples</th></tr></thead><tbody>\${comp.props.map(p=>\`<tr><td class="prop-name">\${esc(p.name)}</td><td class="prop-type">\${esc(p.type)}</td><td>\${esc(p.description)}</td><td style="font-size:11px;color:var(--text3)">\${(p.examples||[]).map(e=>\`"\${esc(e)}"\`).join(', ')}</td></tr>\`).join('')}</tbody></table></div>\`:\`\`}
    \${comp.variants.length?\`<div class="modal-section"><h3>Variants (\${comp.variants.length})</h3><div style="display:flex;flex-direction:column;gap:8px">\${comp.variants.map(v=>\`<div style="background:var(--bg2);padding:10px 14px;border-radius:var(--r-sm);display:flex;align-items:center;gap:12px"><span style="font-size:13px;font-weight:600;color:var(--accent);min-width:80px">\${esc(v.name)}</span><span style="font-size:12px;color:var(--text3);flex:1">\${esc(v.description)}</span><span style="font-size:10px;color:var(--text3)">\${v.instanceIds.length}×</span></div>\`).join('')}</div></div>\`:\`\`}
    \${snippet?\`<div class="modal-section"><h3>Generated Code</h3>
      <div class="code-tabs"><div class="code-tab active" onclick="showModalCode('react')">React</div><div class="code-tab" onclick="showModalCode('tailwind')">Tailwind</div><div class="code-tab" onclick="showModalCode('html')">HTML</div></div>
      <div class="code-block" id="modal-code-block" data-react="\${btoa(encodeURIComponent(snippet.react))}" data-tailwind="\${btoa(encodeURIComponent(snippet.tailwind))}" data-html="\${btoa(encodeURIComponent(snippet.html))}"><button class="code-copy" onclick="event.stopPropagation();copyFromBlock(this)">Copy</button>\${esc(snippet.react)}</div>
    </div>\`:\`\`}
    <div class="modal-section"><h3>Instances (\${comp.instanceIds.length})</h3><div class="modal-children">\${instances.slice(0,20).map(i=>\`<span class="modal-child-tag" onclick="openRawCompModal('\${i.id}')"><span class="type-dot" style="background:\${tc(i.type)};width:6px;height:6px"></span>\${esc(i.name)}</span>\`).join('')}</div></div>\`;
  document.getElementById('modal').classList.add('open');
}

function showModalCode(tab){
  const block=document.getElementById('modal-code-block');
  if(!block)return;
  const data=block.getAttribute('data-'+tab);
  if(data){
    const code=decodeURIComponent(atob(data));
    block.innerHTML=\`<button class="code-copy" onclick="event.stopPropagation();copyFromBlock(this)">Copy</button>\`+esc(code);
  }
  block.parentElement.querySelectorAll('.code-tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase()===tab));
}

function openRawCompModal(id){
  const c=DS.components.find(x=>x.id===id);if(!c)return;
  const ch=DS.components.filter(x=>x.parentId===c.id);
  const pa=c.parentId?DS.components.find(x=>x.id===c.parentId):null;
  // Find AI component this belongs to
  const aiComp=hasAI()?DS.analysis.componentLibrary.find(ac=>ac.instanceIds.includes(c.id)):null;

  document.getElementById('modal-title').innerHTML=\`<span class="type-dot" style="background:\${tc(c.type)};width:10px;height:10px;display:inline-block;border-radius:50%;margin-right:6px"></span>\${c.type}/\${c.subType}: \${esc(c.name)}\`;
  document.getElementById('modal-body').innerHTML=\`
    \${c.screenshot?\`<div class="modal-shot"><img src="/output/\${c.screenshot}"/></div>\`:\`\`}
    \${aiComp?\`<div style="background:var(--green)11;border:1px solid var(--green)33;border-radius:var(--r-md);padding:12px 16px;margin-bottom:16px;font-size:13px"><span style="color:var(--green);font-weight:600">🤖 AI:</span> Part of <span style="color:var(--accent);cursor:pointer;font-weight:600" onclick="openAiCompModal('\${aiComp.id}')">\${esc(aiComp.displayName)}</span> component</div>\`:\`\`}
    <div class="modal-section"><h3>Info</h3><div class="style-grid">
      <div class="style-row"><span class="style-key">type</span><span class="style-val">\${c.type} / \${c.subType}</span></div>
      <div class="style-row"><span class="style-key">size</span><span class="style-val">\${c.rect.width}×\${c.rect.height}px</span></div>
      \${pa?\`<div class="style-row"><span class="style-key">parent</span><span class="style-val" style="cursor:pointer;color:var(--accent)" onclick="openRawCompModal('\${pa.id}')">\${esc(pa.type)}: \${esc(pa.name)}</span></div>\`:\`\`}
    </div></div>
    \${ch.length?\`<div class="modal-section"><h3>Children (\${ch.length})</h3><div class="modal-children">\${ch.map(x=>\`<span class="modal-child-tag" onclick="openRawCompModal('\${x.id}')"><span class="type-dot" style="background:\${tc(x.type)};width:6px;height:6px"></span>\${esc(x.type)}: \${esc(x.name)}</span>\`).join('')}</div></div>\`:\`\`}
    <div class="modal-section"><h3>Styles</h3><div class="style-grid">\${Object.entries(c.styles||{}).filter(([k,v])=>v&&v!=='none'&&v!=='normal'&&v!=='0px'&&v!=='').map(([k,v])=>\`<div class="style-row"><span class="style-key">\${k}</span><span class="style-val">\${esc(String(v))}</span></div>\`).join('')}</div></div>
    <div class="modal-section"><h3>HTML</h3><div class="code-block"><button class="code-copy" onclick="event.stopPropagation();copyFromBlock(this)">Copy</button>\${esc(fmtHtml(c.html))}</div></div>\`;
  document.getElementById('modal').classList.add('open');
}

function openSectionModal(i){
  const s=DS.sections[i];
  document.getElementById('modal-title').textContent=s.name;
  // Find AI blueprint
  const bp=hasAI()?DS.analysis.sectionBlueprint.find(b=>b.sectionId===s.id):null;
  document.getElementById('modal-body').innerHTML=\`
    \${s.screenshot?\`<div class="modal-shot"><img src="/output/\${s.screenshot}" style="max-height:400px"/></div>\`:\`\`}
    \${bp?\`<div style="background:var(--green)11;border:1px solid var(--green)33;border-radius:var(--r-md);padding:12px 16px;margin-bottom:16px">
      <div style="color:var(--green);font-weight:600;font-size:13px;margin-bottom:4px">🤖 AI Analysis</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px"><strong>Purpose:</strong> \${esc(bp.purpose)}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px"><strong>Layout:</strong> <span style="background:var(--bg3);padding:1px 6px;border-radius:99px;font-size:10px">\${esc(bp.layoutType)}</span></div>
      \${bp.componentRefs.length?\`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">\${bp.componentRefs.map(cr=>\`<span style="font-size:10px;background:var(--accent-dim);padding:2px 8px;border-radius:99px;color:var(--accent)">\${esc(cr)}</span>\`).join('')}</div>\`:\`\`}
    </div>\`:\`\`}
    <div class="modal-section"><h3>Info</h3><div class="style-grid">
      <div class="style-row"><span class="style-key">tag</span><span class="style-val">&lt;\${s.tag}&gt;</span></div>
      <div class="style-row"><span class="style-key">size</span><span class="style-val">\${s.rect.width}×\${s.rect.height}px</span></div>
      \${Object.entries(s.dataAttributes||{}).map(([k,v])=>\`<div class="style-row"><span class="style-key">\${k}</span><span class="style-val">\${esc(v)}</span></div>\`).join('')}
    </div></div>\`;
  document.getElementById('modal').classList.add('open');
}

function openSvgModal(i){
  const s=DS.assets.svgs[i];
  document.getElementById('modal-title').textContent=s.title||\`SVG #\${i}\`;
  document.getElementById('modal-body').innerHTML=\`
    <div class="modal-shot" style="color:var(--text)">\${s.html}</div>
    <div class="modal-section"><h3>SVG Code</h3><div class="code-block"><button class="code-copy" onclick="event.stopPropagation();copyFromBlock(this)">Copy</button>\${esc(fmtHtml(s.html))}</div></div>\`;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function empty(m){return\`<div class="empty"><div class="emoji">📭</div>\${m}</div>\`}
function fmtHtml(h){let i=0;return h.replace(/></g,'>\\n<').split('\\n').map(l=>{l=l.trim();if(l.startsWith('</'))i=Math.max(i-1,0);const r='  '.repeat(i)+l;if(l.startsWith('<')&&!l.startsWith('</')&&!l.endsWith('/>')&&!l.includes('</'))i++;return r}).join('\\n')}
function copyText(t){navigator.clipboard.writeText(t)}
function copyFromBlock(btn){const block=btn.closest('.code-block');if(block){const t=block.textContent.replace('Copy','').trim();navigator.clipboard.writeText(t);btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500)}}

boot();
</script>
</body>
</html>
